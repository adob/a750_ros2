controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    a750_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    a750_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    a750_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    a750_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    a750_gripper_controller:
      type: position_controllers/GripperActionController

a750_forward_position_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - finger
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position


a750_forward_velocity_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - finger
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity

a750_joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - finger

    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 50.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)


a750_gripper_controller:
  ros__parameters:
    joint: gripper_joint
    command_interfaces:
      - position
    state_interfaces:
      - position